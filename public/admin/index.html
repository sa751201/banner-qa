<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Banner QA 後台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
header{background:#1e293b;padding:16px 28px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #334155}
header h1{font-size:16px;font-weight:600}
.key-wrap{margin-left:auto;display:flex;align-items:center;gap:8px}
.key-input{padding:7px 12px;border-radius:7px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:13px;width:200px}
.layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 57px)}
.left{background:#1e293b;border-right:1px solid #334155;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.panel-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#64748b}
.drop{border:2px dashed #334155;border-radius:10px;padding:24px 14px;text-align:center;cursor:pointer;transition:all .2s}
.drop:hover,.drop.over{border-color:#3b82f6;background:rgba(59,130,246,.05)}
.drop p{font-size:12px;color:#64748b;margin-top:6px}
.drop strong{color:#3b82f6}
input[type=file]{display:none}
.log{display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto}
.log-item{background:#0f172a;border-radius:7px;padding:10px 12px;font-size:12px}
.log-name{font-weight:600;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-wrap{height:3px;background:#1e293b;border-radius:2px;margin-top:6px;overflow:hidden}
.bar{height:100%;border-radius:2px;transition:width .3s}
.bar-spin{background:#facc15;width:55%;animation:spin 1.2s ease-in-out infinite alternate}
.bar-ok{background:#22c55e;width:100%}
.bar-err{background:#ef4444;width:100%}
.log-status{margin-top:4px;font-size:11px;color:#64748b}
.ok{color:#22c55e}.err{color:#ef4444}
@keyframes spin{to{opacity:.4}}
.right{padding:20px;overflow-y:auto}
.toolbar{display:flex;gap:10px;margin-bottom:16px}
.toolbar input{flex:1;padding:8px 13px;border-radius:7px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:13px}
.toolbar input::placeholder{color:#475569}
.count{font-size:12px;color:#64748b;margin-bottom:12px}
.card{background:#1e293b;border-radius:10px;border:1px solid #334155;margin-bottom:10px;overflow:hidden}
.card-header{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;user-select:none}
.card-header:hover{background:rgba(255,255,255,.02)}
.card-title{font-weight:600;font-size:14px;color:#e2e8f0}
.card-sub{font-size:11px;color:#475569;margin-top:2px}
.badge{display:inline-block;padding:2px 7px;border-radius:9px;font-size:11px;margin-right:4px;margin-top:4px}
.bd-blue{background:#1e3a8a;color:#93c5fd}
.bd-green{background:#14532d;color:#86efac}
.bd-gray{background:#0f172a;color:#64748b;border:1px solid #334155}
.bd-purple{background:#3b0764;color:#d8b4fe}
.chevron{color:#475569;font-size:11px;transition:transform .2s;margin-top:2px;flex-shrink:0}
.chevron.open{transform:rotate(90deg)}
.act-btn{padding:4px 9px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:600;flex-shrink:0}
.btn-dl{background:#1e40af;color:#fff}.btn-dl:hover{background:#1d4ed8}
.btn-del{background:#7f1d1d;color:#fff}.btn-del:hover{background:#991b1b}
.card-body{display:none;border-top:1px solid #334155;padding:16px}
.card-body.open{display:block}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#64748b;margin-bottom:10px}
.psd-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.psd-item{background:#0f172a;border-radius:8px;padding:11px 13px;display:flex;align-items:center;gap:10px}
.psd-info{flex:1}
.psd-name{font-size:13px;font-weight:600}
.psd-meta{font-size:11px;color:#475569;margin-top:2px}
.layer-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:#1e3a5f;color:#7dd3fc;margin-left:6px}
.psd-form{background:#0f172a;border-radius:8px;padding:13px;border:1px dashed #334155}
.psd-form input[type=text]{width:100%;padding:7px 10px;border-radius:6px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:12px;margin-bottom:8px}
.psd-form input[type=text]::placeholder{color:#475569}
.psd-drop-zone{border:1px dashed #334155;border-radius:6px;padding:14px;text-align:center;cursor:pointer;font-size:12px;color:#64748b;transition:all .2s}
.psd-drop-zone:hover{border-color:#3b82f6;color:#93c5fd}
.upload-btn{margin-top:8px;width:100%;padding:8px;border-radius:6px;border:none;background:#2563eb;color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.upload-btn:hover{background:#1d4ed8}
.upload-btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.psd-status{font-size:11px;margin-top:6px;min-height:16px}
.empty{text-align:center;padding:40px;color:#475569}
</style>
</head>
<body>
<header>
  <div>📐</div>
  <h1>Banner QA 後台管理</h1>
  <div class="key-wrap">
    <span style="font-size:12px;color:#64748b">Admin Key</span>
    <input type="password" class="key-input" id="adminKey" placeholder="輸入管理金鑰">
  </div>
</header>
<div class="layout">
  <div class="left">
    <div class="panel-label">上傳規格 PDF</div>
    <div class="drop" id="drop"
         onclick="document.getElementById('fileIn').click()"
         ondragover="event.preventDefault();this.classList.add('over')"
         ondragleave="this.classList.remove('over')"
         ondrop="onDrop(event)">
      <div style="font-size:28px">📄</div>
      <p><strong>點擊或拖曳 PDF</strong></p>
      <p>最多 60 個，Claude 自動解析規則結構</p>
    </div>
    <input type="file" id="fileIn" accept=".pdf" multiple onchange="onSelect(event)">
    <div class="panel-label">上傳紀錄</div>
    <div class="log" id="log"><p style="font-size:12px;color:#475569">尚無上傳記錄</p></div>
  </div>

  <div class="right">
    <div class="toolbar">
      <input type="text" id="searchIn" placeholder="搜尋名稱或關鍵字..." oninput="load()">
    </div>
    <div class="count" id="cnt"></div>
    <div id="guidelineList"><div class="empty">請先輸入 Admin Key</div></div>
  </div>
</div>

<script>
const key = () => document.getElementById('adminKey').value.trim();
const psdFiles = {};

// ── PDF 上傳 ──────────────────────────────────────────
function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop').classList.remove('over');
  processFiles([...e.dataTransfer.files].filter(f => f.type === 'application/pdf'));
}
function onSelect(e) { processFiles([...e.target.files]); }

async function processFiles(files) {
  if (!key()) { alert('請輸入 Admin Key'); return; }
  const logEl = document.getElementById('log');
  if (logEl.querySelector('p')) logEl.innerHTML = '';
  const ids = {};
  files.forEach(f => {
    const id = 'f' + Math.random().toString(36).slice(2); ids[f.name] = id;
    logEl.insertAdjacentHTML('afterbegin', `<div class="log-item" id="${id}">
      <div class="log-name">📄 ${f.name}</div>
      <div class="bar-wrap"><div class="bar bar-spin" id="b${id}"></div></div>
      <div class="log-status" id="s${id}">解析中...</div>
    </div>`);
  });
  for (const f of files) {
    const id = ids[f.name];
    try {
      const fd = new FormData(); fd.append('pdf', f);
      const res = await fetch('/admin/upload', { method: 'POST', headers: {'x-admin-key': key()}, body: fd });
      const d = await res.json();
      if (res.ok && d.success) {
        document.getElementById('b'+id).className = 'bar bar-ok';
        document.getElementById('s'+id).innerHTML = `<span class="ok">✅ ${d.action==='updated'?'更新':'建立'}：${d.label}（${d.rulesCount} 規則）</span>`;
      } else throw new Error(d.error||'失敗');
    } catch(e) {
      document.getElementById('b'+id).className = 'bar bar-err';
      document.getElementById('s'+id).innerHTML = `<span class="err">❌ ${e.message}</span>`;
    }
  }
  load();
}

// ── 載入列表 ──────────────────────────────────────────
async function load() {
  if (!key()) {
    document.getElementById('guidelineList').innerHTML = '<div class="empty">請先輸入 Admin Key</div>';
    document.getElementById('cnt').textContent = '';
    return;
  }
  const q = document.getElementById('searchIn').value;
  const res = await fetch(`/admin/guidelines${q?`?search=${encodeURIComponent(q)}`:''}`, { headers: {'x-admin-key': key()} });
  if (!res.ok) { document.getElementById('guidelineList').innerHTML = `<div class="empty">載入失敗</div>`; return; }
  const d = await res.json();
  document.getElementById('cnt').textContent = `共 ${d.total} 個 Banner 規格`;
  if (!d.items.length) { document.getElementById('guidelineList').innerHTML = '<div class="empty">尚未建立規格</div>'; return; }

  document.getElementById('guidelineList').innerHTML = d.items.map(g => {
    const psdCount = g.psdTemplates?.length || 0;
    return `<div class="card">
      <div class="card-header" onclick="toggleCard('${g.typeKey}')">
        <div style="flex:1;min-width:0">
          <div class="card-title">${g.label}</div>
          <div class="card-sub">${g.typeKey}${g.aliases?.length?' · '+g.aliases.slice(0,3).join(', '):''}</div>
          <div>
            <span class="badge bd-blue">${g.rulesCount} 規則</span>
            ${g.hasPdf?'<span class="badge bd-green">PDF ✓</span>':''}
            <span class="badge ${psdCount>0?'bd-purple':'bd-gray'}">${psdCount} PSD 模板</span>
            ${g.dimensions?`<span class="badge bd-gray">${g.dimensions.width}×${g.dimensions.height}</span>`:''}
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          ${g.hasPdf?`<button class="act-btn btn-dl" onclick="event.stopPropagation();dlPdf('${g.typeKey}','${g.label}')">PDF</button>`:''}
          <button class="act-btn btn-del" onclick="event.stopPropagation();delG('${g.typeKey}','${g.label}')">刪除</button>
          <span class="chevron" id="chev-${g.typeKey}">▶</span>
        </div>
      </div>
      <div class="card-body" id="body-${g.typeKey}">
        <div class="section-label">🎨 PSD 設計模板</div>
        <div class="psd-list">${renderPsdItems(g.typeKey, g.psdTemplates||[])}</div>
        <div class="psd-form">
          <div style="font-size:12px;color:#64748b;margin-bottom:8px;font-weight:500">新增 PSD 模板</div>
          <input type="text" id="pname-${g.typeKey}" placeholder="版型名稱（例如：A 版 淺色背景 + 品牌合作）">
          <div class="psd-drop-zone" id="pdrop-${g.typeKey}"
               onclick="document.getElementById('pfile-${g.typeKey}').click()"
               ondragover="event.preventDefault();this.style.borderColor='#3b82f6'"
               ondragleave="this.style.borderColor=''"
               ondrop="onPsdDrop(event,'${g.typeKey}')">
            拖曳 .psd 檔案到此，或點擊選擇
          </div>
          <input type="file" id="pfile-${g.typeKey}" accept=".psd" onchange="onPsdSelect(event,'${g.typeKey}')">
          <button class="upload-btn" id="pbtn-${g.typeKey}" onclick="uploadPsd('${g.typeKey}')" disabled>上傳 PSD 模板</button>
          <div class="psd-status" id="pstatus-${g.typeKey}"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderPsdItems(typeKey, templates) {
  if (!templates.length) return `<p style="font-size:12px;color:#475569;margin-bottom:4px">尚未上傳 PSD 模板</p>`;
  return templates.map(t => `
    <div class="psd-item">
      <div style="font-size:22px">🎨</div>
      <div class="psd-info">
        <div class="psd-name">${t.name}</div>
        <div class="psd-meta">${t.psdFilename} · ${t.psdSizeKB} KB${t.hasLayers?`<span class="layer-tag">${t.textLayerCount} 文字圖層</span>`:' <span style="color:#ef4444;font-size:10px">（無法解析圖層）</span>'}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="act-btn btn-dl" onclick="dlPsd('${typeKey}','${t.id}','${t.psdFilename}')">下載</button>
        <button class="act-btn btn-del" onclick="delPsd('${typeKey}','${t.id}','${t.name}')">刪除</button>
      </div>
    </div>`).join('');
}

// ── Card 展開 ─────────────────────────────────────────
function toggleCard(k) {
  const b = document.getElementById('body-'+k);
  const c = document.getElementById('chev-'+k);
  const open = b.classList.toggle('open');
  c.classList.toggle('open', open);
}

// ── PSD 選擇 ──────────────────────────────────────────
function onPsdDrop(e, k) {
  e.preventDefault();
  document.getElementById('pdrop-'+k).style.borderColor='';
  const f = e.dataTransfer.files[0];
  if (f&&f.name.toLowerCase().endsWith('.psd')) setPsd(k,f); else alert('請選擇 .psd 檔案');
}
function onPsdSelect(e, k) { if(e.target.files[0]) setPsd(k, e.target.files[0]); }
function setPsd(k, file) {
  psdFiles[k] = file;
  document.getElementById('pdrop-'+k).textContent = `已選：${file.name} (${Math.round(file.size/1024)} KB)`;
  document.getElementById('pbtn-'+k).disabled = false;
}

// ── PSD 上傳 ──────────────────────────────────────────
async function uploadPsd(k) {
  const name = document.getElementById('pname-'+k).value.trim();
  const file = psdFiles[k];
  if (!name) { alert('請填寫版型名稱'); return; }
  if (!file) { alert('請選擇 PSD 檔案'); return; }
  const btn = document.getElementById('pbtn-'+k);
  const status = document.getElementById('pstatus-'+k);
  btn.disabled = true; btn.textContent = '上傳中...';
  status.style.color = '#facc15';
  status.textContent = '⏳ 上傳並解析 PSD 圖層中（可能需要 10-30 秒）...';
  try {
    const fd = new FormData(); fd.append('psd', file); fd.append('name', name);
    const res = await fetch(`/admin/guidelines/${k}/psd-templates`, { method:'POST', headers:{'x-admin-key':key()}, body:fd });
    const d = await res.json();
    if (res.ok && d.success) {
      status.style.color = '#22c55e';
      status.textContent = `✅ 上傳成功！${d.template.hasLayers?`解析到 ${d.template.textLayerCount} 個文字圖層`:'（PSD 解析器不支援此版本，仍可儲存）'}`;
      document.getElementById('pname-'+k).value = '';
      document.getElementById('pdrop-'+k).textContent = '拖曳 .psd 檔案到此，或點擊選擇';
      btn.textContent = '上傳 PSD 模板';
      delete psdFiles[k];
      load();
    } else throw new Error(d.error||'上傳失敗');
  } catch(e) {
    status.style.color = '#ef4444';
    status.textContent = `❌ ${e.message}`;
    btn.textContent = '上傳 PSD 模板';
    btn.disabled = false;
  }
}

// ── 刪除 ──────────────────────────────────────────────
async function delG(k, label) {
  if (!confirm(`刪除「${label}」及其所有 PSD 模板？`)) return;
  await fetch(`/admin/guidelines/${k}`, { method:'DELETE', headers:{'x-admin-key':key()} });
  load();
}
async function delPsd(k, tid, name) {
  if (!confirm(`刪除 PSD 模板「${name}」？`)) return;
  const res = await fetch(`/admin/guidelines/${k}/psd-templates/${tid}`, { method:'DELETE', headers:{'x-admin-key':key()} });
  if (res.ok) load(); else alert('刪除失敗');
}
function dlPdf(k, label) { const a=document.createElement('a'); a.href=`/admin/pdf/${k}?key=${key()}`; a.download=label+'.pdf'; a.click(); }
function dlPsd(k, tid, filename) { const a=document.createElement('a'); a.href=`/admin/guidelines/${k}/psd-templates/${tid}/download?key=${key()}`; a.download=filename; a.click(); }

document.getElementById('adminKey').addEventListener('input', load);
</script>
</body>
</html>
